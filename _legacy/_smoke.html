<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>수시 공용 골격 smoke · 맥스수시</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/light/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/sidebar.css">
  <link rel="stylesheet" href="assets/css/topbar.css">
  <link rel="stylesheet" href="assets/css/buttons.css">
  <link rel="stylesheet" href="assets/css/toast.css">
  <link rel="stylesheet" href="assets/css/combobox.css">
  <style>
    .smoke-card {
      margin: 24px;
      padding: 24px;
      background: var(--surface-1, #fff);
      border: 1px solid var(--line, #e7e5e4);
      border-radius: var(--r-lg, 16px);
      box-shadow: var(--shadow-soft, 0 1px 3px rgba(0,0,0,0.05));
    }
    .smoke-card h2 { margin-top: 0; }
    .smoke-card .status { font-family: 'Geist Mono', monospace; font-size: 13px; }
    .smoke-card .ok { color: var(--ok, #15803d); }
    .smoke-card .fail { color: var(--danger, #dc2626); }
  </style>
</head>
<body data-page="dashboard" data-title="공용 골격 Smoke" data-category="수시 리팩 Phase 1">

  <div class="app-shell" id="appShell">
    <div id="sidebar-slot"></div>
    <div class="main">
      <header class="topbar">
        <div class="page-path">
          <span>수시 리팩 Phase 1</span>
          <span class="sep">/</span>
          <span class="current">공용 골격 Smoke</span>
        </div>
        <div class="topbar-actions"></div>
      </header>

      <section class="page-content">
        <div class="smoke-card">
          <h2>Smoke 체크리스트</h2>
          <ul class="status" id="smokeList">
            <li id="chk-sidebar">사이드바 fetch …</li>
            <li id="chk-theme">테마 토글 주입 …</li>
            <li id="chk-api-base">window.SUSI_API / API_BASE …</li>
            <li id="chk-year">SUSI_YEAR + 사이드바 셀렉터 …</li>
            <li id="chk-header">X-Susi-Year 헤더 빌드 …</li>
            <li id="chk-toast">토스트 컨테이너 …</li>
          </ul>
        </div>
      </section>
    </div>
  </div>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/toast.js"></script>
  <script src="assets/js/modal.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/combobox.js"></script>
  <script src="assets/js/bootstrap.js"></script>

  <script>
    window.addEventListener('load', function () {
      function mark(id, ok, detail) {
        var el = document.getElementById(id);
        if (!el) return;
        el.className = 'status ' + (ok ? 'ok' : 'fail');
        el.textContent = (ok ? '✓ ' : '✗ ') + el.textContent.replace(/…$/, '').trim() + (detail ? ' — ' + detail : '');
      }
      setTimeout(function () {
        var hasSidebar = !!document.querySelector('#sidebar-slot .sidebar');
        mark('chk-sidebar', hasSidebar, hasSidebar ? 'injected' : 'fetch failed');

        var hasTheme = !!document.getElementById('themeToggle');
        mark('chk-theme', hasTheme, hasTheme ? 'button present' : 'missing');

        var base = window.SUSI_API;
        mark('chk-api-base', base === 'https://supermax.kr/susi', base || 'undefined');

        var yearBox = document.getElementById('sidebarYearCombo');
        var yearComboMounted = !!(yearBox && yearBox.classList.contains('combobox'));
        mark('chk-year', yearComboMounted && !!window.getSusiYear, 'combobox=' + yearComboMounted + ' year=' + (window.SUSI_YEAR || '?'));

        var headerOK = true;
        try {
          var origFetch = window.fetch;
          // spy only for this test: nothing to trigger network, just verify api.js wiring exists
          headerOK = typeof window.api === 'function' && typeof window.apiBinary === 'function';
        } catch (e) { headerOK = false; }
        mark('chk-header', headerOK, 'api() + apiBinary() defined');

        var toastOK = !!document.getElementById('toastContainer');
        mark('chk-toast', toastOK, toastOK ? 'container present' : 'missing');
      }, 400);
    });
  </script>
</body>
</html>
